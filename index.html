<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=1920, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Isthoppuwa Menu Board</title>
    <meta name="description" content="Digital Menu Board for Isthoppuwa" />
    <style>
      html {
        min-width: 1920px;
        min-height: 1080px;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      :root {
        --bg-color: #0b0c10;
        --bg-gradient-start: #1c1e26;
        --bg-gradient-end: #0b0c10;
        --text-primary: #ffffff;
        --text-secondary: #a0aabf;
        --accent-color: #f3a952;
        --accent-glow: rgba(243, 169, 82, 0.4);
        --card-bg: rgba(255, 255, 255, 0.04);
        --card-border: rgba(255, 255, 255, 0.08);
        --font-main: 'Segoe UI', Arial, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        font-family: var(--font-main);
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .menu-board {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 2vw;
        position: relative;
        z-index: 1;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.8vh;
        padding-bottom: 0.8vh;
        border-bottom: 1px solid var(--card-border);
      }
      .logo { display: flex; align-items: center; }
      .logo-img {
        height: 12vh;
        max-width: 100%;
        object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      }
      .header-right { display: flex; gap: 1vw; align-items: center; }
      .countdown {
        font-size: 1.5vw;
        font-weight: 600;
        color: #f4d50b;
        background: var(--card-bg);
        padding: 1vh 2vw;
        border-radius: 50px;
        border: 1px solid var(--card-border);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        width: 20vw;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
      }
      .page-indicator {
        font-size: 1.5vw;
        font-weight: 600;
        color: rgba(255,255,255,0.6);
        background: var(--card-bg);
        padding: 1vh 2vw;
        border-radius: 50px;
        border: 1px solid var(--card-border);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        letter-spacing: 1px;
      }
      .clock {
        font-size: 2.5vw;
        font-weight: 600;
        color: var(--text-primary);
        background: var(--card-bg);
        padding: 1vh 2vw;
        border-radius: 50px;
        border: 1px solid var(--card-border);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      }
      .menu-container {
        flex: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 2vw;
        justify-content: center;
        align-content: flex-start;
        overflow: hidden;
        transition: opacity 0.5s ease-in-out;
      }
      .category {
        flex: 0 0 calc((100% - 4vw) / 3);
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 1vw;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        display: flex;
        flex-direction: column;
        gap: 0.5vh;
        box-shadow: 0 16px 32px 0 rgba(0,0,0,0.4);
        transition: transform 0.3s ease;
      }
      .menu-container.count-2 .category,
      .menu-container.count-4 .category { flex: 0 0 calc((100% - 2vw) / 2); }
      .menu-container.count-6 .category { padding: 0.8vw; gap: 0.2vh; }
      .menu-container.count-6 .category-title { font-size: 1.3vw; padding-bottom: 0.2vh; margin-bottom: 0.2vh; }
      .menu-container.count-6 .dish-name { font-size: 1.0vw; line-height: 1.1; }
      .menu-container.count-6 .dish-price { font-size: 1.1vw; line-height: 1.1; }
      .category:hover { transform: translateY(-5px); border-color: rgba(243,169,82,0.3); }
      .category-title {
        font-size: 1.8vw;
        font-weight: 800;
        text-align: center;
        color: var(--accent-color);
        margin-bottom: 1vh;
        text-transform: uppercase;
        letter-spacing: 2px;
        position: relative;
        padding-bottom: 1vh;
      }
      .category-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
      }
      .dish { display: flex; flex-direction: column; gap: 0; margin-bottom: 0; }
      .dish-header { display: flex; justify-content: space-between; align-items: baseline; gap: 1vw; }
      .dish-name {
        font-size: 1.4vw;
        font-weight: 600;
        padding: 5px 0;
        color: var(--text-primary);
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }
      .dish-dots {
        flex-grow: 1;
        border-bottom: 2px dotted rgba(255,255,255,0.2);
        margin: 0 1vw;
        position: relative;
        top: -0.6vw;
      }
      .dish-price {
        font-size: 1.5vw;
        font-weight: 800;
        color: var(--accent-color);
        text-shadow: 0 2px 10px var(--accent-glow);
      }
      footer {
        margin-top: 1vh;
        height: 4.5vh;
        background: rgba(0,0,0,0.5);
        border: 1px solid var(--card-border);
        border-radius: 50px;
        display: flex;
        align-items: center;
        overflow: hidden;
        box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
      }
      .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; position: relative; }
      .ticker-wrap::before, .ticker-wrap::after { content: ''; position: absolute; top: 0; width: 10vw; height: 100%; z-index: 2; }
      .ticker-wrap::before { left: 0; background: linear-gradient(to right, var(--bg-color), transparent); }
      .ticker-wrap::after { right: 0; background: linear-gradient(to left, var(--bg-color), transparent); }
      .ticker {
        display: inline-block;
        white-space: nowrap;
        animation: ticker 30s linear infinite;
        padding-left: 2vw;
      }
      .ticker:hover { animation-play-state: paused; }
      .ticker-item {
        display: inline-block;
        padding: 0 2vw;
        font-size: 1.5vw;
        font-weight: 400;
        color: var(--text-primary);
        letter-spacing: 1px;
      }
      .ticker-item::after { content: "\2736"; color: var(--accent-color); margin-left: 4vw; font-size: 1vw; opacity: 0.5; vertical-align: middle; }
      .ticker-item:last-child::after { content: ""; margin: 0; }
      @keyframes ticker {
        0%   { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(-50%, 0, 0); }
      }
    </style>
  </head>
