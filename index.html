<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isthoppuwa Menu Board</title>
    <meta name="description" content="Digital Menu Board for Isthoppuwa" />
    <link rel="stylesheet" href="styles.css" />

        <div class="logo">
          <span class="logo-highlight">Isthoppuwa</span>

        </div>

      <main id="menu-container" class="menu-container">
        <!-- Categories will be injected here via JavaScript -->
      </main>

      <footer>
